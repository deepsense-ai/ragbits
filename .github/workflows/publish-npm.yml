name: Publish NPM packages

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_call:
    inputs:
      tag:
        description: 'npm dist-tag to publish under'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install TypeScript dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Publish @ragbits/api-client
        run: npm publish --provenance --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
        working-directory: typescript/@ragbits/api-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ragbits/api-client-react
        run: npm publish --provenance --access public ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}
        working-directory: typescript/@ragbits/api-client-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
